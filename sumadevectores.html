<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suma de Vectores</title>
</head>
<body>

<svg width="700" height="500">

<!-- Ejes -->

<line x1="80" y1="400" x2="650" y2="400"
stroke="black" stroke-width="2"/>

<line x1="80" y1="400" x2="80" y2="50"
stroke="black" stroke-width="2"/>

<text x="660" y="405">x</text>
<text x="70" y="40">y</text>

<!-- Flecha -->

<defs>
<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="8"
refY="3"
orient="auto">
<polygon points="0 0,10 3,0 6"/>
</marker>
</defs>

<!-- Vector a -->

<line x1="80" y1="400"
      x2="250" y2="250"
      stroke="blue"
      stroke-width="3"
      marker-end="url(#arrow)"/>

<text x="160" y="300">a⃗</text>

<!-- Componentes a -->

<line x1="80" y1="250"
      x2="250" y2="250"
      stroke="gray"
      stroke-dasharray="5,5"/>

<line x1="250" y1="400"
      x2="250" y2="250"
      stroke="gray"
      stroke-dasharray="5,5"/>

<text x="150" y="420">ax</text>
<text x="260" y="330">ay</text>

<!-- Vector b -->

<line x1="250" y1="250"
      x2="450" y2="150"
      stroke="green"
      stroke-width="3"
      marker-end="url(#arrow)"/>

<text x="350" y="180">b⃗</text>

<!-- Componentes b -->

<line x1="250" y1="150"
      x2="450" y2="150"
      stroke="gray"
      stroke-dasharray="5,5"/>

<line x1="450" y1="250"
      x2="450" y2="150"
      stroke="gray"
      stroke-dasharray="5,5"/>

<text x="340" y="140">bx</text>
<text x="460" y="210">by</text>

<!-- Vector suma -->

<line x1="80" y1="400"
      x2="450" y2="150"
      stroke="red"
      stroke-width="4"
      marker-end="url(#arrow)"/>

<text x="240" y="190">a⃗+b⃗</text>

<!-- Componentes suma -->

<text x="260" y="420">ax+bx</text>
<text x="470" y="280">ay+by</text>

</svg>

</body>
</html>
